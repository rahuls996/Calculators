<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Avoid stale index.html after deploys (old HTML → missing hashed JS → blank page). -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Insurance Calculators | Find Your Perfect Plan in 30 Seconds</title>
  <script>
    (function () {
      var path = location.pathname;
      var mark = '/Calculators';
      var i = path.indexOf(mark);
      if (i === -1) return;
      var after = path.slice(i + mark.length);
      var slash = after.indexOf('/');
      var href =
        slash === -1
          ? path.slice(0, i + mark.length) + '/'
          : path.slice(0, i + mark.length + slash + 1);
      var b = document.createElement('base');
      b.href = href;
      var first = document.head.querySelector('link[rel="preconnect"]') || document.head.querySelector('link') || document.head.firstChild;
      document.head.insertBefore(b, first);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
